# ==============================================================================
# tmux Configuration - Dracula Theme
# ==============================================================================

# ------------------------------------------------------------------------------
# General
# ------------------------------------------------------------------------------
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0

# ------------------------------------------------------------------------------
# Status Bar
# ------------------------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colors (Dracula)
set -g status-style "bg=#282a36,fg=#f8f8f2"

# Left: session name
set -g status-left "#[bg=#bd93f9,fg=#282a36,bold] #S #[bg=#282a36,fg=#bd93f9]"
set -g status-left-length 30

# Right: date & time
set -g status-right "#[fg=#6272a4]#[bg=#6272a4,fg=#f8f8f2] %Y-%m-%d #[bg=#bd93f9,fg=#282a36,bold] %H:%M "
set -g status-right-length 50

# Windows
set -g window-status-format "#[bg=#282a36,fg=#6272a4] #I #W "
set -g window-status-current-format "#[bg=#44475a,fg=#bd93f9,bold] #I #W #[bg=#282a36,fg=#44475a]"
set -g window-status-separator ""

# ------------------------------------------------------------------------------
# Pane Border
# ------------------------------------------------------------------------------
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"

# ------------------------------------------------------------------------------
# Message Style
# ------------------------------------------------------------------------------
set -g message-style "bg=#44475a,fg=#f8f8f2"
